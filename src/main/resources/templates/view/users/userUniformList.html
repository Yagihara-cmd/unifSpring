<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>ユニフォーム一覧</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<!-- ブラウザ全体 -->
	<div id="wrap">

		<!--ヘッダー部分  -->
		<div th:insert="~{/common/header :: frag}"></div>

		<!-- メニュー部分 -->
		<div id="menu">
			<div class="container">
				<!-- ナビゲーション  -->
				<div id="nav">

				</div>

				<!-- ページタイトル -->
				<div id="page_title">
					<h2>一覧</h2>
				</div>
			</div>
		</div>

		<!-- コンテンツ部分 -->
		<div id="main" class="container">

			<!-- リスト -->
			<table class="list-table">
				<thead>
					<tr>
						<th>No.</th>
						<th>種類</th>
						<th>金額</th>
						<th>カートに入れる</th>
					</tr>
				</thead>
				<tbody th:if="${uniform_list.size()>= 1}">
					<tr th:each="uniform : ${uniform_list}" th:object="${uniform}">
						<td th:text="${uniform.uniid}"></td>
						<td th:text="${uniform.uniname}"></td>
						<td th:text="'&#165 ' +${#numbers.formatInteger(uniform.price, 3, 'COMMA')}"></td>
						<td><a th:href="@{/UserOrderCreate(uniid=${uniform.uniid})}" th:text="カートに入れる"></a></td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>

	</div>
</body>

</html>
