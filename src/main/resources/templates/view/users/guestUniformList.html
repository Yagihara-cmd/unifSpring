<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>ユニフォーム一覧</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<!-- ブラウザ全体 -->
	<div id="wrap">

		<!--ヘッダー部分  -->
		<div th:insert="~{/common/header :: frag}"></div>

		<!-- メニュー部分 -->
		<div id="menu">
			<div class="container">
				<div id="nav">
					<ul>
						<li><a th:href="@{/userMyPage}">[マイページ]</a></li>
						<li><a th:href="@{/userCreate}">[会員登録]</a></li>
						<li><a th:href="@{/guestOrderCreate}">[カート]</a></li>
					</ul>
				</div>
				<!-- ページタイトル -->
				<div id="page_title">
					<h2>一覧</h2>
				</div>
			</div>
		</div>

		<!-- コンテンツ部分 -->
		<div id="main" class="container">

			<!-- リスト -->
			<table class="list-table">
				<thead>
					<tr>
						<th>No.</th>
						<th>種類</th>
						<th>金額</th>
						<th>在庫数</th>
						<th>数量</th>
						<th>カートに入れる</th>
					</tr>
				</thead>
				<tbody th:if="${uniform_list.size()>= 1}">
					<tr th:each="uniform : ${uniform_list}" th:object="${uniform}">
						<td th:text="${uniform.uniid}"></td>
						<td th:text="${uniform.uniname}"></td>
						<td th:text="'&#165 ' +${#numbers.formatInteger(uniform.price, 3, 'COMMA')}"></td>
						
						<form id="cartForm" class="inline-block" th:action="@{/guestOrderCreate}">
							<td id="stockVal" th:text="${uniform.stock}"></td>
							<td><input id="quantityVal" type="text" name="quantity" th:value="${quantity}"></td>
							<input type="hidden" name="uniid" th:value="${uniform.uniid}">
							<td><input type="submit" value="カートに入れる"></td>
						</form>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>

	</div>
</body>

<script>
	document.getElementById('cartForm').addEventListener('submit', function(event) {
	
	const stockVal = document.getElementById('stockVal').innerHTML;
	const quantityVal = document.getElementById('quantityVal').value;

	// 内容のチェック（例：名前が空の場合）
	if (stockVal == 0) {
		alert('在庫がありません。');      
		// 送信をキャンセル
		event.preventDefault(); 
	} else if (stockVal < quantityVal){
		alert('注文数が在庫数を上回っています。');      
		// 送信をキャンセル
		event.preventDefault(); 
	}
    
  });
</script>



</html>
