<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>会員登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- ブラウザ全体 -->
    <div id="wrap">

		<div th:insert="~{/common/header :: frag}"></div>

        <!-- メニュー部分 -->
        <div id="menu">
            <div class="container">
                <div id="nav">
					<ul>
						<li><a th:href="/guestUniformList">[一覧]</a></li>
						<li><a th:href="/guestOrderCreate">[カート]</a></li>
					</ul>
				</div>
                <!-- ページタイトル -->
                <div id="page_title">
                    <h2>新規会員登録</h2>
                </div>
            </div>
        </div>

        <!-- 書籍登録コンテンツ部分 -->
        <div id="main" class="container">
        	
            <!--  入力フォーム -->
            <form action="/userUniformList" method="POST" th:object="${user}">
                <table class="input-table" align="center">
					<tr>
						<th>ID</th>
					 	<td>
							<input type="text" name="userid" th:value="*{userid}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('userid')}" th:errors="*{userid}" th:errorclass="error-msg"></p>
					     </td>
					</tr>
                    <tr>
                        <th>氏名</th>
                        <td>
							<input type="text" name="name" th:value="*{name}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" th:errorclass="error-msg"></p>
                        </td>
                    </tr>
                    <tr>
                        <th>住所</th>
                        <td>
							<input type="text" name="address" th:value="*{address}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" th:errorclass="error-msg"></p>
						</td>
                    </tr>
                    <tr>
                        <th>メールアドレス</th>
                        <td>
							<input type="text" name="email" th:value="*{email}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" th:errorclass="error-msg"></p>
						</td>
                    </tr>
                    <tr>
                        <th>パスワード</th>
                        <td>
							<input type="text" name="password" th:value="*{password}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" th:errorclass="error-msg"></p>
						</td>
                    </tr>
                </table>
                <input type="submit" value="登録">
            </form>
        </div>
		
		<div th:insert="~{/common/footer :: frag}"></div>
		
    </div>
</body>
</html>
