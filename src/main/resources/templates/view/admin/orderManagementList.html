<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>管理者ユニフォーム管理画面</title>

	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<!-- 元のHTMLの上部にあったヘッダー・リンクエリア -->
	<header class="site-header">
		<!--ヘッダー部分  -->
		<div th:insert="~{/common/header :: frag}"></div>
	</header>

	<!-- レイアウト用のコンテナ -->
	<div class="header-container">
		<!-- 左上：一覧画面へ遷移するためのリンク -->
		<div class="nav-left">
			<a th:href="@{/adminUniformList}" class="btn-link btn-secondary">一覧画面更新（トップへ）</a>
		</div>

		<!-- 右上：今月と先月の売り上げ表示 -->
		<div class="sales-summary" style="text-align: right; margin-bottom: 20px;">
			<p>今月の売り上げ: <span th:text="${#numbers.formatInteger(monthTotal ?: 0, 3, 'COMMA')}">0</span> 円</p>
			<p>先月の売り上げ: <span th:text="${#numbers.formatInteger(lastMonthTotal ?: 0, 3, 'COMMA')}">0</span> 円</p>
		</div>

		<!-- 注文管理テーブル -->
		<table border="1">
			<thead>
				<tr>
					<th>No.</th>
					<th>注文日</th>
					<th>氏名</th>
					<th>種類（商品ID）</th>
					<th>合計金額（単価）</th>
					<th>入金状況</th>
					<th>発送状況</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<!-- Javaから送った order_list でループを回します -->
				<tr th:each="order : ${order_list}" th:object="${order}">
					<td th:text="${order.orderno}">1</td>
					<td th:text="${#dates.format(order.date, 'yyyy/MM/dd')}">2026/06/25</td>

					<td th:text="*{userid}">ユーザーID</td>

					<td th:text="*{uniid}">ユニフォームID</td>

					<td th:text="${order.price * order.quantity}">0</td>

					<td th:switch="${order.paymentstatus}">
						<span th:case="0">未入金</span>
						<span th:case="1">入金済み</span>
						<span th:case="*">不明</span>
					</td>
					<!-- 発送状況 -->
					<td th:switch="${order.shippingstatus}">
						<span th:case="0">未発送</span>
						<span th:case="1">発送済み</span>
						<span th:case="*">不明</span>
					</td>
					<td>
						<a th:href="@{/orderDetail(orderno=${order.orderno})}">詳細</a>
						/
						<a th:href="@{/orderUpdate(orderno=${order.orderno})}">更新</a>
					</td>
					
				</tr>
			</tbody>
		</table>
	</div>

	<div th:unless="${order_list != null and !#lists.isEmpty(order_list)}" class="no-data">
		<p>受注データが存在しません。</p>
	</div>
	</main>

	<footer class="site-footer">
		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>
	</footer>

</body>

</html>
