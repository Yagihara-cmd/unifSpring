<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>受注管理一覧</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<!-- ブラウザ全体 -->
	<div id="adminWrap">

		<!--ヘッダー部分  -->
		<div th:insert="~{/common/header :: frag}"></div>

		<!-- メニュー部分 -->
		<div id="adminMenu">
			<div class="container">
				<!-- ナビゲーション  -->
				<div id="nav">
					<ul>
						<li><a href="/adminUniformList">ユニフォーム一覧</a></li>
					</ul>
				</div>

				<!-- ページタイトル -->
				<div id="page_title">
					<h2>受注管理一覧</h2>
				</div>
			</div>
		</div>

		<!-- コンテンツ部分 -->
		<div id="main" class="container">

			<!--今月と先月の売り上げ表示 -->
			<div class="sales-summary" style="text-align: center; margin-bottom: 20px;">
				<p>今月の売り上げ: <span th:text="${#numbers.formatInteger(monthTotal ?: 0, 3, 'COMMA')}">0</span> 円</p>
				<p>先月の売り上げ: <span th:text="${#numbers.formatInteger(lastMonthTotal ?: 0, 3, 'COMMA')}">0</span> 円
				</p>
			</div>

			<!-- リスト -->
			<div class="adminTable">
				<table class="list-table">
					<thead>
						<tr>
							<th>No.</th>
							<th>注文日</th>
							<th>氏名</th>
							<th>種類（商品ID）</th>
							<th>合計金額（単価）</th>
							<th>入金状況</th>
							<th>発送状況</th>
							<th>詳細/更新</th>
						</tr>
					</thead>
					<tbody th:if="${order_list.size()>= 1}">
						<tr th:each="order : ${order_list}" th:object="${order}">
							<td th:text="${order.orderno}"></td>
							<td th:text="${#dates.format(order.date, 'yyyy/MM/dd')}"></td>

							<td th:text="*{user.username}"></td>

							<td th:text="*{uniform.uniname}"></td>

							<td th:text="${order.uniform.price * order.quantity}"></td>

							<td th:switch="${order.paymentstatus}">
								<span th:case="0">未入金</span>
								<span th:case="1">入金済み</span>
								<span th:case="*">不明</span>
							</td>
							<!-- 発送状況 -->
							<td th:switch="${order.shippingstatus}">
								<span th:case="0">未発送</span>
								<span th:case="1">発送済み</span>
								<span th:case="2">発送準備中</span>
								<span th:case="*">不明</span>
							</td>
							<td>
								<a th:href="@{/orderDetail(orderno=${order.orderno})}">詳細</a>
								/
								<a th:href="@{/orderUpdate(orderno=${order.orderno})}">更新</a>
							</td>

						</tr>
					</tbody>
				</table>
			</div>

			<div th:unless="${order_list != null and !#lists.isEmpty(order_list)}" class="no-data">
				<p>受注データが存在しません。</p>
			</div>

		</div>

		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>

	</div>

</body>

</html>
