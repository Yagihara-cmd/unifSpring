<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>管理者ユニフォーム管理画面</title>
	<!-- 外部の style.css を読み込む -->
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<!-- 元のHTMLの上部にあったヘッダー・リンクエリア -->
	<header class="site-header">
		<!--ヘッダー部分  -->
		<div th:insert="~{/common/header :: frag}"></div>
	</header>

	<!-- レイアウト用のコンテナ -->
	<div class="header-container">
		<!-- 左上：一覧画面へ遷移するためのリンク -->
		<div class="nav-left">
			<a th:href="@{/adminUniList}" class="btn-link btn-secondary">一覧画面更新（トップへ）</a>
		</div>

		<!-- 右上：今月と先月の売り上げ表示 -->
		<div class="sales-summary" style="text-align: right; margin-bottom: 20px;">
		    <p>今月の売り上げ: <span th:text="${monthTotal != null ? monthTotal : 0}">0</span> 円</p>
		    <p>先月の売り上げ: <span th:text="${lastMonthTotal != null ? lastMonthTotal : 0}">0</span> 円</p>
		</div>

		<!-- 注文管理テーブル -->
		<table border="1">
		    <thead>
		        <tr>
		            <th>No.</th>
		            <th>注文日</th>
		            <th>氏名</th>
		            <th>種類（商品ID）</th>
		            <th>合計金額（単価）</th>
		            <th>入金状況</th>
		            <th>発送状況</th>
		            <th>操作</th>
		        </tr>
		    </thead>
		    <tbody>
		        <!-- Javaから送った order_list でループを回します -->
		        <tr th:each="order : ${order_list}"  th:object="${order}">
		            <td th:text="${order.orderno}">1</td>
		            <!-- 注文日（フォーマットは環境に合わせて調整してください） -->
		           <td th:text="${#dates.format(order.date, 'yyyy/MM/dd')}">2026/06/25</td>
		            
		            <!-- 氏名（一旦IDを表示。紐付け用データがある場合は user.name 等に要変更） -->
		            <td th:text="${order.userid}">ユーザーID</td>
		            
		            <!-- 種類（商品ID） -->
		            <td th:text="${order.uniid}">ユニフォームID</td>
		            
		            <!-- 金額（注文データ内の金額、または単価） -->
		            <td th:text="${order.uniform.price}">0</td>
		            
		            <!-- 入金状況（Entityのプロパティ名に合わせてください。例: paymentStatus） -->
		            <td th:text="${order.paymentstatus != null ? order.paymentstatus : '未入金'}">未入金</td>
		            
		            <!-- 発送状況 -->
		            <td th:text="${order.shippingstatus != null ? order.shippingstatus : '未発送'}">未発送</td>
		            
		           <td>
		                <button>変更</button>
		                <button>削除</button>
		            </td>
		        </tr>
		    </tbody>
		</table>
		</div>

		<div th:unless="${order_list != null and !#lists.isEmpty(order_list)}" class="no-data">
			<p>受注データが存在しません。</p>
		</div>
	</main>

	<footer class="site-footer">
		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>
	</footer>

</body>

</html>
