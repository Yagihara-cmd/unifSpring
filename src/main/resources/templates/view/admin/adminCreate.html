<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>管理者登録</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<!-- ブラウザ全体 -->
	<div id="adminWrap">
	
		<!-- ヘッダー部分 -->
		<div th:insert="~{/common/header :: frag}"></div>
		
		<!-- メニュー部分 -->
		<div id="adminMenu">
			<div class="container">
				
				<!-- ページタイトル -->
				<div id="page_title">
					<h1>管理者登録</h1>
				</div>
			</div>
		</div>
		
		<!-- コンテンツ部分 -->
		<div id="main" class="container">
		
		<!-- エラーメッセージ -->
			<p class="error-msg" th:if="${message} != null" th:text="${message}"></p>

			<!-- 入力フォーム -->
			<form action="/adminCreate" method="POST" th:object="${user}">
				<div class="adminTable">
				<table class="input-table" align="center">
					<tr>
						<th>ID</th>
						<td>
							<input type="text" name="userid" th:value="${strUserid}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('userid')}" th:errors="*{userid}" th:errorclass="error-msg"></p>
						</td>
					</tr>
					<tr>
						<th>PASSWORD</th>
						<td>
							<input type="text" name="password" th:value="${strPassword}" th:errorclass="error-msg">
							<p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" th:errorclass="error-msg"></p>
						</td>
					</tr>
				</table>
				<!-- 仮で登録 -->
				<input type="hidden" name="username" value="管理者">
				<input type="hidden" name="useraddress" value="住所">
				<input type="hidden" name="email" value="メール">
				<input type="hidden" name="authority" value="1">
				
				<input type="submit" value="登録"><br>
			</form>
		</div>
		
		<!-- フッター部分 -->
		<div th:insert="~{/common/footer :: frag}"></div>
		
	</div>
</body>
</html>
